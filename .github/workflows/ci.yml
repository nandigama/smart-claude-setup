name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  cli-build:
    name: Build CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --workspace=cli
      - run: npm run build --workspace=cli

  docs-build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --workspace=docs
      - run: npm run build --workspace=docs
